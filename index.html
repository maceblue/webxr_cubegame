<!DOCTYPE html>
<html>
<head>
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>WebXR CubeGame - Epic Explosion</title>
    <link rel="icon" type="image/png" href="favicon.png" sizes="32x32">
    <link rel="apple-touch-icon" href="apple-touch-icon.png">
    <script src="https://cdn.babylonjs.com/babylon.js"></script>
    <script src="https://cdn.babylonjs.com/loaders/babylonjs.loaders.js"></script>
    <script src="https://cdn.babylonjs.com/gui/babylon.gui.min.js"></script>
    <style>
        html, body { 
            overflow: hidden; 
            width: 100%; 
            height: 100%; 
            margin: 0; 
            padding: 0; 
            background: #0f0f14; 
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
        }
        #renderCanvas { width: 100%; height: 100%; touch-action: none; }
    </style>
</head>
<body>
    <canvas id="renderCanvas"></canvas>
    <script>
        const canvas = document.getElementById("renderCanvas");
        const engine = new BABYLON.Engine(canvas, true);

        const CUBE_SIZE = 5;
        const CUBE_SCALING = 1.2;
        const PLANE_SPACE = 0.1;
        const pi = Math.PI;
        
        const START_TIME_LIMIT = 30; 

        const createScene = async function () {
            const scene = new BABYLON.Scene(engine);
            scene.clearColor = new BABYLON.Color3(0.06, 0.06, 0.09);

            const lightTop = new BABYLON.HemisphericLight("lightTop", new BABYLON.Vector3(0, 1, 0.5), scene);
            lightTop.intensity = 0.85;
            const lightBottom = new BABYLON.HemisphericLight("lightBottom", new BABYLON.Vector3(0, -1, -0.5), scene);
            lightBottom.intensity = 0.55;
            const dirLight = new BABYLON.DirectionalLight("dirLight", new BABYLON.Vector3(-1, -1, -1), scene);
            dirLight.intensity = 0.4;

            const camera = new BABYLON.FreeCamera("camera1", new BABYLON.Vector3(0, 0, 110), scene);
            camera.setTarget(BABYLON.Vector3.Zero());

            // Globaler Spielstatus
            let isGameOver = false;
            let score = 0;
            let start_count = false;
            let currentTimeLimit = START_TIME_LIMIT; 
            let timeLeft = START_TIME_LIMIT;
            let colorPlanes = [];

            // Materialien
            const createMaterial = (name, color) => {
                const mat = new BABYLON.StandardMaterial(name, scene);
                mat.diffuseColor = color;
                mat.specularColor = new BABYLON.Color3(0.4, 0.4, 0.4);
                mat.specularPower = 32; 
                return mat;
            };

            const materials = [
                createMaterial("blue", new BABYLON.Color3(0, 0.75, 1)),
                createMaterial("purple", new BABYLON.Color3(0.85, 0, 0.95)),
                createMaterial("green", new BABYLON.Color3(0, 0.9, 0.1)),
                createMaterial("orange", new BABYLON.Color3(1, 0.55, 0)),
                createMaterial("yellow", new BABYLON.Color3(1, 0.9, 0))
            ];

            const getRandomColor = () => materials[Math.floor(Math.random() * materials.length)];

            let cubeGroup = new BABYLON.TransformNode("cubeGroup", scene);
            cubeGroup.position.set(0, 0, 0);

            // Partikel-System
            const particleSystem = new BABYLON.ParticleSystem("particles", 500, scene);
            particleSystem.particleTexture = new BABYLON.Texture("https://assets.babylonjs.com/textures/flare.png", scene);
            particleSystem.emitter = BABYLON.Vector3.Zero(); 
            particleSystem.minSize = 0.3;
            particleSystem.maxSize = 0.8;
            particleSystem.minLifeTime = 0.2;
            particleSystem.maxLifeTime = 0.5;
            particleSystem.minEmitPower = 8;
            particleSystem.maxEmitPower = 15;
            particleSystem.gravity = new BABYLON.Vector3(0, 0, 0);
            particleSystem.direction1 = new BABYLON.Vector3(-1, -1, -1);
            particleSystem.direction2 = new BABYLON.Vector3(1, 1, 1);
            particleSystem.targetStopDuration = 0.15; 

            function triggerMatchExplosion(mesh, color, customEmitCount = 25) {
                const dummy = new BABYLON.AbstractMesh("dummy", scene);
                dummy.position = mesh.absolutePosition.clone();
                const sys = particleSystem.clone("burst_" + mesh.name, dummy);
                sys.color1 = BABYLON.Color4.FromColor3(color, 1.0);
                sys.color2 = BABYLON.Color4.FromColor3(color, 0.5);
                sys.colorDead = new BABYLON.Color4(0, 0, 0, 0.0);
                sys.manualEmitCount = customEmitCount; 
                sys.start();
                setTimeout(() => { sys.dispose(); dummy.dispose(); }, 600);
            }

            // --- GUI SETUP ---
            const scorePlane = BABYLON.MeshBuilder.CreatePlane("scorePlane", { width: 36, height: 16 }, scene);
            scorePlane.position.set(0, 34, 0);
            scorePlane.billboardMode = BABYLON.Mesh.BILLBOARDMODE_ALL;
            
            const advancedTexture = BABYLON.GUI.AdvancedDynamicTexture.CreateForMesh(scorePlane, 720, 320);
            
            const mainContainer = new BABYLON.GUI.Rectangle();
            mainContainer.width = "100%";
            mainContainer.height = "100%";
            mainContainer.background = "rgba(0, 0, 0, 0.65)";
            mainContainer.cornerRadius = 20;
            mainContainer.thickness = 0;
            advancedTexture.addControl(mainContainer);

            const scoreGrid = new BABYLON.GUI.Grid();
            scoreGrid.addColumnDefinition(1.0);
            scoreGrid.addRowDefinition(0.65); 
            scoreGrid.addRowDefinition(0.35); 
            mainContainer.addControl(scoreGrid);
            
            const scoreText = new BABYLON.GUI.TextBlock();
            scoreText.text = "Score: 0";
            scoreText.color = "white";
            scoreText.fontSize = 52;
            scoreText.textHorizontalAlignment = BABYLON.GUI.Control.HORIZONTAL_ALIGNMENT_CENTER;
            scoreText.textVerticalAlignment = BABYLON.GUI.Control.VERTICAL_ALIGNMENT_BOTTOM;
            scoreGrid.addControl(scoreText, 0, 0);

            const progressTrack = new BABYLON.GUI.Rectangle();
            progressTrack.width = "80%";
            progressTrack.height = "24px";
            progressTrack.cornerRadius = 12;
            progressTrack.color = "#222230";
            progressTrack.thickness = 2;
            progressTrack.background = "#12121a";
            progressTrack.verticalAlignment = BABYLON.GUI.Control.VERTICAL_ALIGNMENT_CENTER;
            scoreGrid.addControl(progressTrack, 1, 0);

            const progressBar = new BABYLON.GUI.Rectangle();
            progressBar.width = "100%";
            progressBar.height = "100%";
            progressBar.cornerRadius = 10;
            progressBar.thickness = 0;
            progressBar.background = "#00ff66";
            progressBar.horizontalAlignment = BABYLON.GUI.Control.HORIZONTAL_ALIGNMENT_LEFT;
            progressTrack.addControl(progressBar);

            const menuPlane = BABYLON.MeshBuilder.CreatePlane("menuPlane", { width: 30, height: 10 }, scene);
            menuPlane.position.set(0, -36, 0);
            menuPlane.billboardMode = BABYLON.Mesh.BILLBOARDMODE_ALL;
            menuPlane.setEnabled(false);

            const menuTexture = BABYLON.GUI.AdvancedDynamicTexture.CreateForMesh(menuPlane, 600, 200);
            
            const newGameBtn = new BABYLON.GUI.Button("newGameBtn");
            newGameBtn.width = "65%";
            newGameBtn.height = "75px";
            newGameBtn.background = "rgba(10, 10, 16, 0.85)"; 
            newGameBtn.color = "#00f0ff";       
            newGameBtn.borderColor = "#00f0ff"; 
            newGameBtn.thickness = 3;
            newGameBtn.cornerRadius = 12;
            
            const btnText = new BABYLON.GUI.TextBlock();
            btnText.text = "New Game";
            btnText.color = "#ffffff";          
            btnText.fontSize = 42;
            newGameBtn.addControl(btnText);
            
            newGameBtn.onPointerUpObservable.add(() => {
                resetGame();
            });
            menuTexture.addControl(newGameBtn);

            function updateDynamicTimeLimit() {
                let reduction = score * 0.05;
                currentTimeLimit = Math.max(6, START_TIME_LIMIT - reduction);
            }

            function getTimerColor(percentage) {
                let r, g, b = 0;
                if (percentage > 0.5) {
                    r = Math.floor(255 * (1 - percentage) * 2);
                    g = 255;
                } else {
                    r = 255;
                    g = Math.floor(255 * (percentage * 2));
                }
                return "#" + ((1 << 24) + (r << 16) + (g << 8) + b).toString(16).slice(1);
            }

            // --- TIMER LOGIK ---
            scene.registerBeforeRender(() => {
                if (isGameOver || !start_count) return;

                const deltaTime = engine.getDeltaTime() / 1000;
                timeLeft -= deltaTime;

                if (timeLeft <= 0) {
                    timeLeft = 0;
                    triggerGameOver();
                }

                const percentage = timeLeft / currentTimeLimit;
                progressBar.width = `${percentage * 100}%`;
                progressBar.background = getTimerColor(percentage);
            });

            // --- GAME OVER: EPIC CUBE EXPLOSION ---
            function triggerGameOver() {
                isGameOver = true;
                scoreText.text = "GAME OVER\nFinal Score: " + score;
                scoreText.color = "#ff3333";
                progressBar.width = "0%";
                menuPlane.setEnabled(true); 

                // Detonation aller Kacheln simulieren
                colorPlanes.forEach((mesh, index) => {
                    mesh.isAnimating = true;
                    
                    // Berechne Vektor von der Mitte des Würfels weg für die Druckwelle
                    let pushDirection = mesh.position.normalizeToNew();
                    let targetExplodePosition = mesh.position.add(pushDirection.scale(35)); 

                    // Trigger Partikeleffekt direkt am Mesh
                    setTimeout(() => {
                        triggerMatchExplosion(mesh, mesh.material.diffuseColor, 15);
                    }, Math.random() * 200); // Leicht asynchroner "Kettenreaktions"-Effekt

                    // Positions-Animation (Wegfliegen)
                    let animPos = new BABYLON.Animation("explodePos", "position", 60, BABYLON.Animation.ANIMATIONTYPE_VECTOR3);
                    animPos.setKeys([
                        { frame: 0, value: mesh.position.clone() },
                        { frame: 35, value: targetExplodePosition }
                    ]);

                    // Skalierungs-Animation (In der Luft verpuffen)
                    let animScale = new BABYLON.Animation("explodeScale", "scaling", 60, BABYLON.Animation.ANIMATIONTYPE_VECTOR3);
                    animScale.setKeys([
                        { frame: 0, value: new BABYLON.Vector3(1, 1, 1) },
                        { frame: 10, value: new BABYLON.Vector3(1.3, 1.3, 1.3) },
                        { frame: 35, value: BABYLON.Vector3.Zero() }
                    ]);

                    mesh.animations = [animPos, animScale];
                    scene.beginAnimation(mesh, 0, 35, false);
                });
            }

            // --- NEW GAME: CUBE RESPAWN ---
            function resetGame() {
                score = 0;
                currentTimeLimit = START_TIME_LIMIT;
                timeLeft = START_TIME_LIMIT;
                isGameOver = false;
                start_count = false;
                
                scoreText.text = "Score: 0";
                scoreText.color = "white";
                progressBar.width = "100%";
                progressBar.background = "#00ff66";
                menuPlane.setEnabled(false); 

                // Alten Würfel-Knoten restlos löschen
                colorPlanes.forEach(m => m.dispose());
                colorPlanes = [];
                cubeGroup.dispose();

                // Neuen TransformNode erstellen
                cubeGroup = new BABYLON.TransformNode("cubeGroup", scene);
                cubeGroup.position.set(0, 0, 0);

                // Würfel neu generieren mit Einfliege-Animation (Respawn)
                generateCubeGrid(true);
            }

            // --- SPIEL-KACHELN GENERIEREN ---
            function generateCubeGrid(animateSpawn = false) {
                const createPlane = (name, targetPosition, rotation) => {
                    const plane = BABYLON.MeshBuilder.CreatePlane(name, { size: CUBE_SIZE }, scene);
                    plane.rotation = rotation;
                    plane.material = getRandomColor();
                    plane.parent = cubeGroup;
                    colorPlanes.push(plane);

                    if (animateSpawn) {
                        plane.isAnimating = true;
                        plane.position = BABYLON.Vector3.Zero(); // Startet im Kern
                        plane.scaling = BABYLON.Vector3.Zero();

                        let animPos = new BABYLON.Animation("spawnPos", "position", 60, BABYLON.Animation.ANIMATIONTYPE_VECTOR3);
                        animPos.setKeys([
                            { frame: 0, value: BABYLON.Vector3.Zero() },
                            { frame: 25, value: targetPosition }
                        ]);

                        let animScale = new BABYLON.Animation("spawnScale", "scaling", 60, BABYLON.Animation.ANIMATIONTYPE_VECTOR3);
                        animScale.setKeys([
                            { frame: 0, value: BABYLON.Vector3.Zero() },
                            { frame: 25, value: new BABYLON.Vector3(1, 1, 1) }
                        ]);

                        plane.animations = [animPos, animScale];
                        scene.beginAnimation(plane, 0, 25, false, 1, () => {
                            plane.isAnimating = false;
                            // Nachdem alle wieder da sind, initiale Matches prüfen
                            if(colorPlanes.every(p => !p.isAnimating)) {
                                checkAndResolveMatches();
                            }
                        });
                    } else {
                        plane.position = targetPosition;
                    }
                };

                const offset = (CUBE_SIZE * 1.5);
                const step = CUBE_SIZE + PLANE_SPACE;
                const bound = CUBE_SIZE * 2 + PLANE_SPACE * 2;

                for (let i = 0; i < 4; i++) {
                    for (let j = 0; j < 4; j++) {
                        let a = -offset + i * step;
                        let b = -offset + j * step;
                        createPlane(`front_${i}_${j}`, new BABYLON.Vector3(a, b, -bound), new BABYLON.Vector3(0, 0, 0));
                        createPlane(`back_${i}_${j}`, new BABYLON.Vector3(a, b, bound), new BABYLON.Vector3(0, pi, 0));
                        createPlane(`left_${i}_${j}`, new BABYLON.Vector3(-bound, a, b), new BABYLON.Vector3(0, pi / 2, 0));
                        createPlane(`right_${i}_${j}`, new BABYLON.Vector3(bound, a, b), new BABYLON.Vector3(0, -pi / 2, 0));
                        createPlane(`top_${i}_${j}`, new BABYLON.Vector3(a, bound, b), new BABYLON.Vector3(pi / 2, 0, 0));
                        createPlane(`bottom_${i}_${j}`, new BABYLON.Vector3(a, -bound, b), new BABYLON.Vector3(-pi / 2, 0, 0));
                    }
                }
                cubeGroup.scaling.set(CUBE_SCALING, CUBE_SCALING, CUBE_SCALING);

                // Klick-Listener neu zuweisen
                setupInteraction();
            }

            function setupInteraction() {
                colorPlanes.forEach(mesh => {
                    mesh.isPickable = true;
                    mesh.actionManager = new BABYLON.ActionManager(scene);
                    mesh.actionManager.registerAction(
                        new BABYLON.ExecuteCodeAction(BABYLON.ActionManager.OnPickTrigger, (evt) => {
                            if (isGameOver) return; 
                            
                            let selected = evt.source;
                            if (mesh.isAnimating) return; 

                            if (selectedMeshes.includes(selected)) {
                                deselectMesh(selected);
                                selectedMeshes = selectedMeshes.filter(m => m !== selected);
                                return;
                            }

                            if (selectedMeshes.length > 0) {
                                if (isAdjacent(selectedMeshes[0], selected)) {
                                    selectMesh(selected);
                                    selectedMeshes.push(selected);
                                }
                            } else {
                                selectMesh(selected);
                                selectedMeshes.push(selected);
                            }

                            if (selectedMeshes.length === 2) {
                                swapMeshes(selectedMeshes[0], selectedMeshes[1]);
                                deselectMesh(selectedMeshes[0]);
                                deselectMesh(selectedMeshes[1]);
                                selectedMeshes = [];
                            }
                        })
                    );
                });
            }

            let selectedMeshes = [];

            // Initialer Start des Grids
            generateCubeGrid(false);

            scene.onReadyObservable.add(() => {
                checkAndResolveMatches();
            });

            function selectMesh(mesh) {
                mesh.isSelected = true;
                mesh.renderOverlay = true;
                mesh.overlayColor = BABYLON.Color3.White();
                mesh.overlayAlpha = 0.25;
                mesh.renderOutline = true;
                mesh.outlineWidth = 0.4;
                mesh.outlineColor = new BABYLON.Color3(1, 1, 1);
                playSelectSound();
            }

            function deselectMesh(mesh) {
                mesh.isSelected = false;
                mesh.scaling.set(1.0, 1.0, 1.0);
                mesh.renderOverlay = false;
                mesh.renderOutline = false;
                playSelectSound();
            }

            function isAdjacent(mesh1, mesh2) {
                let dist = BABYLON.Vector3.Distance(mesh1.position, mesh2.position);
                return dist > 0.1 && dist <= (CUBE_SIZE + PLANE_SPACE) * 1.5;
            }

            function swapMeshes(mesh1, mesh2) {
                start_count = true; 
                mesh1.isAnimating = true;
                mesh2.isAnimating = true;

                let pos1 = mesh1.position.clone();
                let pos2 = mesh2.position.clone();
                let rot1 = mesh1.rotation.clone();
                let rot2 = mesh2.rotation.clone();

                let animP1 = new BABYLON.Animation("p1", "position", 60, BABYLON.Animation.ANIMATIONTYPE_VECTOR3);
                animP1.setKeys([{frame: 0, value: pos1}, {frame: 15, value: pos2}]);
                let animR1 = new BABYLON.Animation("r1", "rotation", 60, BABYLON.Animation.ANIMATIONTYPE_VECTOR3);
                animR1.setKeys([{frame: 0, value: rot1}, {frame: 15, value: rot2}]);

                let animP2 = new BABYLON.Animation("p2", "position", 60, BABYLON.Animation.ANIMATIONTYPE_VECTOR3);
                animP2.setKeys([{frame: 0, value: pos2}, {frame: 15, value: pos1}]);
                let animR2 = new BABYLON.Animation("r2", "rotation", 60, BABYLON.Animation.ANIMATIONTYPE_VECTOR3);
                animR2.setKeys([{frame: 0, value: rot2}, {frame: 15, value: rot1}]);

                mesh1.animations = [animP1, animR1];
                mesh2.animations = [animP2, animR2];

                scene.beginAnimation(mesh1, 0, 15, false);
                let animB = scene.beginAnimation(mesh2, 0, 15, false);

                animB.onAnimationEnd = () => {
                    mesh1.isAnimating = false;
                    mesh2.isAnimating = false;
                    checkAndResolveMatches();
                };
            }

            function checkAndResolveMatches() {
                if (isGameOver) return;

                let toRemove = new Set();
                const threshold = 0.2;

                for (let i = 0; i < colorPlanes.length; i++) {
                    let m1 = colorPlanes[i];
                    if (m1.isAnimating) continue; 
                    
                    let groupX = [m1];
                    let groupY = [m1];
                    let groupZ = [m1];

                    for (let j = 0; j < colorPlanes.length; j++) {
                        if (i === j) continue;
                        let m2 = colorPlanes[j];
                        if (m2.isAnimating) continue;

                        if (m1.material === m2.material && isAdjacent(m1, m2)) {
                            let p1 = m1.position;
                            let p2 = m2.position;

                            if (Math.abs(p1.y - p2.y) < threshold && Math.abs(p1.z - p2.z) < threshold) { groupX.push(m2); }
                            if (Math.abs(p1.x - p2.x) < threshold && Math.abs(p1.z - p2.z) < threshold) { groupY.push(m2); }
                            if (Math.abs(p1.x - p2.x) < threshold && Math.abs(p1.y - p2.y) < threshold) { groupZ.push(m2); }
                        }
                    }

                    if (groupX.length >= 3) { groupX.forEach(m => toRemove.add(m)); }
                    if (groupY.length >= 3) { groupY.forEach(m => toRemove.add(m)); }
                    if (groupZ.length >= 3) { groupZ.forEach(m => toRemove.add(m)); }
                }

                if (toRemove.size > 0) {
                    if (start_count) {
                        score += toRemove.size;
                        scoreText.text = "Score: " + score;
                        
                        updateDynamicTimeLimit();
                        timeLeft = currentTimeLimit; 
                    }

                    playMatchSound();

                    toRemove.forEach(mesh => {
                        mesh.isAnimating = true;
                        const matchColor = mesh.material.diffuseColor;

                        triggerMatchExplosion(mesh, matchColor);

                        mesh.renderOverlay = true;
                        mesh.overlayColor = BABYLON.Color3.White();
                        mesh.overlayAlpha = 0.8;

                        let animScale = new BABYLON.Animation("scaleAnim", "scaling", 60, BABYLON.Animation.ANIMATIONTYPE_VECTOR3);
                        animScale.setKeys([
                            { frame: 0, value: new BABYLON.Vector3(1, 1, 1) },
                            { frame: 6, value: new BABYLON.Vector3(1.2, 1.2, 1.2) }, 
                            { frame: 18, value: BABYLON.Vector3.Zero() }
                        ]);

                        mesh.animations = [animScale];
                        let animTrack = scene.beginAnimation(mesh, 0, 18, false);

                        animTrack.onAnimationEnd = () => {
                            let oldMat = mesh.material;
                            while(mesh.material === oldMat) {
                                mesh.material = getRandomColor();
                            }

                            mesh.renderOverlay = false;
                            mesh.isAnimating = false;

                            let animRespawn = new BABYLON.Animation("respawnAnim", "scaling", 60, BABYLON.Animation.ANIMATIONTYPE_VECTOR3);
                            animRespawn.setKeys([
                                { frame: 0, value: BABYLON.Vector3.Zero() },
                                { frame: 12, value: new BABYLON.Vector3(1, 1, 1) }
                            ]);
                            mesh.animations = [animRespawn];
                            scene.beginAnimation(mesh, 0, 12, false);
                        };
                    });

                    setTimeout(() => { checkAndResolveMatches(); }, 550);
                }
            }

            let pulseTime = 0;
            scene.onBeforeRenderObservable.add(() => {
                pulseTime += 0.1;
                colorPlanes.forEach(mesh => {
                    if (mesh.isSelected && !mesh.isAnimating) {
                        let pulse = 1.1 + Math.sin(pulseTime * 2) * 0.04;
                        mesh.scaling.set(pulse, pulse, pulse);
                        mesh.overlayAlpha = 0.2 + Math.sin(pulseTime * 2) * 0.1;
                    }
                });
            });

            // Rotation
            let isDragging = false;
            let previousPosition = { x: 0, y: 0 };
            let dragVelocity = { x: 0, y: 0 };

            scene.onPointerObservable.add((pointerInfo) => {
                if (isGameOver) return; 

                switch (pointerInfo.type) {
                    case BABYLON.PointerEventTypes.POINTERDOWN:
                        if (pointerInfo.pickInfo.hit && colorPlanes.includes(pointerInfo.pickInfo.pickedMesh)) {
                            return; 
                        }
                        isDragging = true;
                        previousPosition.x = pointerInfo.event.clientX;
                        previousPosition.y = pointerInfo.event.clientY;
                        break;

                    case BABYLON.PointerEventTypes.POINTERMOVE:
                        if (!isDragging) return;
                        let deltaX = pointerInfo.event.clientX - previousPosition.x;
                        let deltaY = pointerInfo.event.clientY - previousPosition.y;

                        cubeGroup.rotate(BABYLON.Axis.Y, -deltaX * 0.007, BABYLON.Space.WORLD);
                        cubeGroup.rotate(BABYLON.Axis.X, deltaY * 0.007, BABYLON.Space.WORLD);

                        dragVelocity.x = -deltaX * 0.007;
                        dragVelocity.y = deltaY * 0.007;

                        previousPosition.x = pointerInfo.event.clientX;
                        previousPosition.y = pointerInfo.event.clientY;
                        break;

                    case BABYLON.PointerEventTypes.POINTERUP:
                        isDragging = false;
                        break;
                }
            });

            scene.onBeforeRenderObservable.add(() => {
                if (!isDragging && !isGameOver) {
                    cubeGroup.rotate(BABYLON.Axis.Y, dragVelocity.x, BABYLON.Space.WORLD);
                    cubeGroup.rotate(BABYLON.Axis.X, dragVelocity.y, BABYLON.Space.WORLD);
                    dragVelocity.x *= 0.95;
                    dragVelocity.y *= 0.95;
                }
            });

            try {
                if (navigator.xr) {
                    scene.createDefaultXRExperienceAsync({ disableTeleportation: true }).then((xr) => {
                        xr.baseExperience.onStateChangedObservable.add((state) => {
                            if (state === BABYLON.WebXRState.IN_XR) {
                                cubeGroup.position.set(0, 0, 15);
                            }
                        });
                    }).catch(err => console.log("XR-Error:", err));
                }
            } catch (e) {
                console.log("WebXR wird nicht unterstützt.");
            }

            // === AUDIO ===
            const audioEl = document.createElement("audio");
            audioEl.src = "ambient-loop.mp3";
            audioEl.loop = true;
            audioEl.volume = 0.3;
            audioEl.preload = "auto";
            document.body.appendChild(audioEl);

            const selectSound = document.createElement("audio");
            selectSound.src = "446129__justinvoke__collect-1.mp3";
            selectSound.preload = "auto";
            document.body.appendChild(selectSound);

            const matchSound = document.createElement("audio");
            matchSound.src = "shiny-coin-pickup.mp3";
            matchSound.preload = "auto";
            matchSound.volume = 0.5;
            document.body.appendChild(matchSound);

            let audioStarted = false;
            let audioEnabled = false;

            const playSelectSound = () => {
                if (selectSound.paused) {
                    selectSound.currentTime = 0;
                    selectSound.play().catch(() => {});
                } else {
                    const clone = selectSound.cloneNode();
                    clone.play().catch(() => {});
                }
            };

            const playMatchSound = () => {
                matchSound.currentTime = 0;
                matchSound.play().catch(() => {});
            };

            const startMusic = async () => {
                try {
                    await audioEl.play();
                    audioStarted = true;
                    audioEnabled = true;
                } catch (e) {
                    console.warn("Audio play failed:", e.message);
                }
                updateAudioButton();
            };

            const stopMusic = () => {
                audioEl.pause();
                audioEnabled = false;
                updateAudioButton();
            };

            const toggleAudio = () => {
                if (audioEnabled) stopMusic();
                else startMusic();
            };

            const audioButton = document.createElement("button");
            audioButton.id = "audioButton";
            const updateAudioButton = () => {
                audioButton.textContent = audioEnabled ? "🔊 Musik aus" : "🔇 Musik an";
                audioButton.style.cssText = "position:fixed;top:16px;left:16px;z-index:1000;padding:8px 12px;border-radius:8px;border:none;background:rgba(0,0,0,0.6);color:#fff;cursor:pointer;font-family:sans-serif;";
            };
            audioButton.addEventListener("click", toggleAudio);
            updateAudioButton();
            document.body.appendChild(audioButton);

            // Audio auf erster User-Interaktion starten (Browser-Autoplay-Regel)
            const firstInteraction = async () => {
                await startMusic();
                window.removeEventListener("pointerdown", firstInteraction);
                window.removeEventListener("keydown", firstInteraction);
                window.removeEventListener("touchstart", firstInteraction);
            };
            window.addEventListener("pointerdown", firstInteraction);
            window.addEventListener("keydown", firstInteraction);
            window.addEventListener("touchstart", firstInteraction);

            return scene;
        };

        createScene().then(scene => {
            engine.runRenderLoop(() => scene.render());
        });

        window.addEventListener("resize", () => engine.resize());
    </script>
</body>
</html>
